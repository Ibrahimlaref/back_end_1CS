x-django-environment: &django-environment
  DJANGO_SETTINGS_MODULE: brahim.settings.prod
  DEBUG: "false"
  SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?Set STRIPE_SECRET_KEY}
  DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}}
  DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-0}
  PGBOUNCER_ENABLED: ${PGBOUNCER_ENABLED:-true}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/app/firebase.json}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-true}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}

x-django-service: &django-service
  image: ${IMAGE_TAG:?Set IMAGE_TAG}
  restart: unless-stopped
  environment: *django-environment
  depends_on:
    - pgbouncer
    - redis
  networks:
    - backend

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
    depends_on:
      - db
    ports:
      - "6432:5432"
    networks:
      - backend

  django:
    <<: *django-service
    profiles:
      - ops

  django_1:
    <<: *django-service

  django_2:
    <<: *django-service

  django_3:
    <<: *django-service

  celery-worker:
    image: ${IMAGE_TAG:?Set IMAGE_TAG}
    restart: unless-stopped
    command: celery -A brahim worker -l info -Q default,notifications,payments,analytics,scheduled
    environment: *django-environment
    depends_on:
      - pgbouncer
      - redis
    networks:
      - backend

  celery-beat:
    image: ${IMAGE_TAG:?Set IMAGE_TAG}
    restart: unless-stopped
    command: celery -A brahim beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment: *django-environment
    depends_on:
      - pgbouncer
      - redis
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - django_1
      - django_2
      - django_3
    networks:
      - backend

volumes:
  pg_data:

networks:
  backend:
